ai_usage_summary: |
  Used Gemini as an agentic AI engineering assistant to accelerate development, 
  streamline the alignment between the local CLI pipeline and the Streamlit web 
  sandbox, and improve overall engineering productivity. Specifically, Gemini 
  assisted in implementing the candidate data normalization script 
  (`normalize_candidates_for_local.py`) to systematically map nested fields 
  (such as anonymized names, locations, and employment durations) into the 
  flattened aliases required by the precompute pipeline. It was also leveraged 
  to troubleshoot local environment issues, resolve dependency and configuration 
  challenges, optimize development workflows, and automate repetitive engineering 
  tasks such as code refinement, validation, and testing. Additionally, Gemini 
  assisted in executing and verifying the complete pipeline 
  (`precompute/run_all.py` and `rank.py`) to ensure schema consistency, correct 
  data flow, and reproducible outputs. All architectural decisions, feature engineering, 
  ranking methodology, and implementation were designed, reviewed, and validated by our 
  team. No candidate data was uploaded to or processed by external LLM services; all 
  preprocessing, embedding generation, scoring, and model inference were performed entirely 
  within the local environment in accordance with the competition constraints.


# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |

  Our ranking methodology follows a three-stage, explainable AI pipeline designed 
  to accurately identify and rank the most suitable candidates for a given job 
  description while ensuring transparency and reproducibility. In the first stage, 
  a hybrid retrieval engine combines BM25 keyword search with semantic vector search 
  to efficiently retrieve the most relevant candidate profiles based on semantic 
  similarity, skill alignment, experience relevance, keyword overlap, and domain 
  expertise. The shortlisted candidates are then evaluated using a weighted multi-factor 
  scoring engine that assigns importance to Skills Alignment (25%), Experience Relevance (20%), 
  Project Quality (15%), Education Match (10%), Domain Expertise (10%), AI Reasoning Confidence (10%), 
  Certification Score (5%), and Fraud Risk Adjustment (5%). These weighted signals are 
  aggregated to generate a comprehensive match score that balances technical expertise, 
  practical experience, educational background, and candidate credibility. Finally, candidates 
  are ranked according to their composite scores, with each recommendation accompanied by a 
  confidence score, fraud status, and an explainable reasoning report. This methodology delivers 
  an interpretable, scalable, and production-ready ranking system that enables recruiters to make 
  faster, data-driven hiring decisions while maintaining fairness, consistency, and trust in the 
  selection process.

